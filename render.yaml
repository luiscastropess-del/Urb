services:
  - type: web
    name: urb-web
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/web
    buildCommand: |
      npm install -g pnpm
      pnpm install --no-frozen-lockfile
      npx prisma generate --schema=../../packages/shared/prisma/schema.prisma
      pnpm build
    startCommand: pnpm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: urb-db
          property: connectionString
      - key: NODE_ENV
        value: production

